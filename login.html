<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Login • Sabores da Juju

    </title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;600;700&family=Playfair+Display:wght@700&display=swap"
          rel="stylesheet">

    <link
        rel="stylesheet"
        href="css/admin.css">

</head>

<body>

<div class="login">

    <div class="login-box">

        <div class="logo">

            🍽️

        </div>

        <h1>

            Sabores da Juju

        </h1>

        <span>

            Painel Administrativo

        </span>

        <form id="formLogin">

            <input

                type="text"

                id="usuario"

                placeholder="Usuário"

                required>

            <input

                type="password"

                id="senha"

                placeholder="Senha"

                required>

            <button>

                Entrar

            </button>

        </form>

        <p>

            © MDR Sites

        </p>

    </div>

</div>

<script src="js/admin.js"></script>

</body>

</html>
