<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo</title>

    <link rel="stylesheet" href="admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container">

        <h1>Painel Administrativo</h1>

<div class="abas">

    <button id="abaProdutos">🍽️ Pratos</button>

    <button id="abaAcompanhamentos">🥗 Acompanhamentos</button>

    <button id="abaFinalizacoes">🥔 Finalizações</button>

</div>

<div class="formulario">

            <input
                type="hidden"
                id="produtoId">

            <label id="lblNome">

    Nome

</label>

            <input
                type="text"
                id="nome">

            <label id="lblPreco">

    Preço

</label>

            <input
                type="number"
                id="preco"
                step="0.01">

            <button id="btnSalvar">

                Salvar

            </button>

        </div>

        <hr>

<h2 id="tituloTabela">

    Pratos cadastrados

</h2>

        <table>

            <thead>

                <tr>

                    <th>Nome</th>

                    <th>Preço</th>

                    <th>Ações</th>

                </tr>

            </thead>

            <tbody id="listaProdutos">

            </tbody>

        </table>

    </div>

    <script type="module" src="admin.js"></script>

</body>

</html>
