<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        Painel • Sabores da Juju

    </title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
          rel="stylesheet">

    <link
        rel="stylesheet"
        href="css/admin.css">

</head>

<body>

<div class="painel">

    <!-- MENU -->

    <aside class="sidebar">

        <h2>

            🍽️

            Sabores da Juju

        </h2>

        <ul>

            <li class="ativo">

                Dashboard

            </li>

            <li>

                Pratos

            </li>

            <li>

                Acompanhamentos

            </li>

            <li>

                Finalizações

            </li>

            <li>

                Pedidos

            </li>

            <li>

                Configurações

            </li>

        </ul>

    </aside>

    <!-- CONTEÚDO -->

    <main class="conteudo">

        <header>

            <h1>

                Dashboard

            </h1>

        </header>

        <!-- CARDS -->

        <section class="cards">

            <div class="card">

                <h3>

                    Pratos

                </h3>

                <span>

                    6

                </span>

            </div>

            <div class="card">

                <h3>

                    Acompanhamentos

                </h3>

                <span>

                    5

                </span>

            </div>

            <div class="card">

                <h3>

                    Finalizações

                </h3>

                <span>

                    3

                </span>

            </div>

        </section>

        <!-- TABELA -->

        <section class="tabela">

            <div class="topo-tabela">

                <h2>

                    Pratos Cadastrados

                </h2>

                <button id="novoPrato">

                    + Novo Prato

                </button>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>

                            Nome

                        </th>

                        <th>

                            Valor

                        </th>

                        <th>

                            Ações

                        </th>

                    </tr>

                </thead>

                <tbody id="listaPratos">

                    <tr>

                        <td>

                            Bife à Cavalo

                        </td>

                        <td>

                            R$22,00

                        </td>

                        <td>

                            <button>

                                Editar

                            </button>

                            <button>

                                Excluir

                            </button>

                        </td>

                    </tr>

                    <tr>

                        <td>

                            Frango à Parmegiana

                        </td>

                        <td>

                            R$18,00

                        </td>

                        <td>

                            <button>

                                Editar

                            </button>

                            <button>

                                Excluir

                            </button>

                        </td>

                    </tr>

                </tbody>

            </table>

        </section>

    </main>

</div>
    <!--=========================================
MODAL NOVO PRATO
==========================================-->

<div id="modalPrato" class="modal-admin">

    <div class="modal-admin-box">

        <div class="modal-topo">

            <h2>

                Novo Prato

            </h2>

            <button id="fecharModal">

                ×

            </button>

        </div>

        <div class="formulario">

            <label>

                Nome do Prato

            </label>

            <input
                type="text"
                id="nomePrato">

            <label>

                Preço

            </label>

            <input
                type="number"
                id="precoPrato">

            <label>

                Descrição

            </label>

            <textarea
                id="descricaoPrato"></textarea>

            <label>

                Imagem

            </label>

            <input
                type="file"
                id="imagemPrato">

            <button
                id="salvarPrato">

                Salvar Prato

            </button>

        </div>

    </div>

</div>

<script src="js/admin.js"></script>

</body>

</html>
